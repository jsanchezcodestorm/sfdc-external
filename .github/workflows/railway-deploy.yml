name: Deploy to Railway

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: railway-deploy-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  SERVICE_PATH: sfdc-external

jobs:
  deploy:
    name: Build and deploy ${{ matrix.railway_service }}
    if: github.ref_name == 'main' || github.ref_name == 'master'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        railway_service:
          - sfdc-api
          - sfdc-web
    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
    defaults:
      run:
        working-directory: sfdc-external
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: sfdc-external

      - name: Checkout shared packages
        uses: actions/checkout@v4
        with:
          repository: CodeStormLab/cs-products-shared-packages
          path: platform-shared-packages
          token: ${{ secrets.SHARED_PACKAGES_REPOSITORY_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.SERVICE_PATH }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run prisma:generate --workspace backend && npm run build

      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.42.1

      - name: Prepare Railway upload
        shell: bash
        run: |
          set -euo pipefail

          railway_service="${{ matrix.railway_service }}"
          upload_root="${RUNNER_TEMP}/railway-upload"
          service_root="${upload_root}/sfdc-external"
          dockerfile_path="${upload_root}/deploy/railway/${railway_service}.Dockerfile"

          rm -rf "${upload_root}"
          mkdir -p "${service_root}" "$(dirname "${dockerfile_path}")"

          tar \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./dist' \
            --exclude='./coverage' \
            --exclude='./*.tsbuildinfo' \
            -cf - . | tar -xf - -C "${service_root}"

          mkdir -p "${upload_root}/platform-shared-packages"
          tar \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./dist' \
            --exclude='./coverage' \
            --exclude='./*.tsbuildinfo' \
            -cf - -C "${GITHUB_WORKSPACE}/platform-shared-packages" . | tar -xf - -C "${upload_root}/platform-shared-packages"

          case "${railway_service}" in
            sfdc-api)
              cat > "${dockerfile_path}" <<'DOCKERFILE'
          FROM node:22-bookworm-slim
          
          RUN apt-get update \
            && apt-get install -y --no-install-recommends python3 make g++ openssl ca-certificates \
            && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /app/sfdc-external
          
          COPY sfdc-external /app/sfdc-external
          COPY platform-shared-packages /app/platform-shared-packages
          
          RUN npm ci
          RUN rm -f tsconfig*.tsbuildinfo backend/tsconfig*.tsbuildinfo frontend/tsconfig*.tsbuildinfo shared/tsconfig*.tsbuildinfo
          RUN npm run prisma:generate --workspace backend
          RUN npm run build --workspace backend
          
          ENV NODE_ENV=production
          
          CMD ["sh", "-lc", "npm run prisma:migrate:deploy --workspace backend && npm run start --workspace backend"]
          DOCKERFILE
              ;;
            sfdc-web)
              cat > "${dockerfile_path}" <<'DOCKERFILE'
          FROM node:22-bookworm-slim
          
          RUN apt-get update \
            && apt-get install -y --no-install-recommends python3 make g++ openssl ca-certificates \
            && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /app/sfdc-external
          
          COPY sfdc-external /app/sfdc-external
          COPY platform-shared-packages /app/platform-shared-packages
          
          RUN npm ci
          RUN rm -f tsconfig*.tsbuildinfo backend/tsconfig*.tsbuildinfo frontend/tsconfig*.tsbuildinfo shared/tsconfig*.tsbuildinfo
          RUN npm run build --workspace frontend
          
          ENV NODE_ENV=production
          
          CMD ["npm", "run", "start", "--workspace", "frontend"]
          DOCKERFILE
              ;;
            *) echo "Unsupported Railway service: ${railway_service}" >&2; exit 1 ;;
          esac

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${RAILWAY_API_TOKEN:-}" || -z "${RAILWAY_PROJECT_ID:-}" ]]; then
            echo "Missing RAILWAY_API_TOKEN or RAILWAY_PROJECT_ID secret." >&2
            exit 1
          fi

          railway_service="${{ matrix.railway_service }}"
          link_args=(link --project "${RAILWAY_PROJECT_ID}" --service "${railway_service}")
          up_args=(up "${RUNNER_TEMP}/railway-upload" --path-as-root --service "${railway_service}" --ci)

          if [[ -n "${RAILWAY_ENVIRONMENT:-}" ]]; then
            link_args+=(--environment "${RAILWAY_ENVIRONMENT}")
            up_args+=(--environment "${RAILWAY_ENVIRONMENT}")
          fi

          railway "${link_args[@]}"
          railway "${up_args[@]}"
